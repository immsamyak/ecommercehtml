<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Alvicx Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">Alvicx Store</a>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact Us</a></li>
        <li><a href="blog.html">Blog</a></li>
      </ul>
    </nav>
    <div class="nav-icons">
      <a href="account.html"><i class="fa-regular fa-user"></i></a>
      <a href="cart.html" class="active">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-count">2</span>
      </a>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">Your Cart</h1>
      <div id="cart-content">
        <div class="cart-layout">
          <div class="cart-items-container">
            <table class="cart-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Price</th>
                  <th>Quantity</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>
                    <div class="cart-item-flex">
                      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80" alt="Wireless Headphones" class="img-60">
                      <div class="fw-500">Wireless Headphones</div>
                    </div>
                  </td>
                  <td>$199.99</td>
                  <td>1</td>
                  <td class="fw-600">$199.99</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="cart-summary-container">
            <div class="cart-summary">
              <h3 class="mb-1-5 fs-1-2">Order Summary</h3>
              <div class="summary-row d-flex justify-between mb-1">
                <span>Subtotal</span>
                <span>$199.99</span>
              </div>
              <div class="summary-row d-flex justify-between mb-1">
                <span>Shipping</span>
                <span>Free</span>
              </div>
              <div class="summary-row summary-total d-flex justify-between border-top pt-1 fw-bold fs-1-2">
                <span>Total</span>
                <span>$199.99</span>
              </div>
              <a href="checkout.html" class="btn w-100 mt-1-5 block text-center">Proceed to Checkout</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-no-margin">
    <div class="footer-bottom">
      &copy; 2026 Alvicx Store. All rights reserved.
    </div>
  </footer>
</body>
</html>
