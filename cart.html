<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Alvicx Store</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cart-layout {
      display: flex;
      gap: 3rem;
      margin-top: 2rem;
    }
    .cart-items-container {
      flex: 2;
    }
    .cart-summary-container {
      flex: 1;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Alvicx Store</a>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact Us</a></li>
        <li><a href="blog.html">Blog</a></li>
      </ul>
    </nav>
    <div class="nav-icons">
      <a href="account.html"><i class="fa-regular fa-user"></i></a>
      <a href="cart.html" class="active">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-count">2</span>
      </a>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">Your Cart</h1>
      <div id="cart-content">
        <div class="cart-layout">
          <div class="cart-items-container">
            <table class="cart-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Price</th>
                  <th>Quantity</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>
                    <div class="cart-item-flex">
                      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80" alt="Wireless Headphones" style="width: 60px; height: 60px; object-fit: cover;">
                      <div style="font-weight: 500;">Wireless Headphones</div>
                    </div>
                  </td>
                  <td>$199.99</td>
                  <td>1</td>
                  <td style="font-weight: 600;">$199.99</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="cart-summary-container">
            <div class="cart-summary">
              <h3 style="margin-bottom: 1.5rem; font-size: 1.2rem;">Order Summary</h3>
              <div class="summary-row" style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                <span>Subtotal</span>
                <span>$199.99</span>
              </div>
              <div class="summary-row" style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                <span>Shipping</span>
                <span>Free</span>
              </div>
              <div class="summary-row summary-total" style="display:flex; justify-content:space-between; border-top:1px solid #e5e5e5; padding-top:1rem; font-weight:bold; font-size:1.2rem;">
                <span>Total</span>
                <span>$199.99</span>
              </div>
              <a href="checkout.html" class="btn" style="width: 100%; margin-top: 1.5rem; display:block; text-align:center;">Proceed to Checkout</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-bottom" style="margin-top:0;">
      &copy; 2026 Alvicx Store. All rights reserved.
    </div>
  </footer>
</body>
</html>
