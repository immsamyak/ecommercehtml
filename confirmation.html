<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | Alvicx Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .confirmation-box {
      text-align: center;
      padding: 4rem 2rem;
      background: #f9f9f9;
      border-radius: var(--radius);
      margin-top: 2rem;
    }
    .check-icon {
      font-size: 4rem;
      color: var(--success-color);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Alvicx Store</a>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="container">
      <div class="form-container" style="max-width: 600px;">
        <div class="confirmation-box">
          <i class="fa-solid fa-circle-check check-icon"></i>
          <h1 style="margin-bottom: 1rem;">Order Confirmed!</h1>
          <p style="color: var(--text-light); margin-bottom: 2rem;">Thank you for your purchase. We have received your order and will begin processing it shortly.</p>
          <div style="font-weight: 600; margin-bottom: 2rem; font-size: 1.1rem;">
            Order ID: <span>#000124</span>
          </div>
          <a href="products.html" class="btn">Continue Shopping</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
