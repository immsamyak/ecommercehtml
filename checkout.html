<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Alvicx Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">Alvicx Store</a>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">Checkout</h1>
      <div class="cart-layout">
        <div class="cart-items-container">
          <div class="form-container w-100 m-0">
            <h3 class="mb-1-5">Shipping Information</h3>
            <form id="checkout-form" action="payment.html">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" required>
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" required>
              </div>
              <div class="form-group">
                <label>Shipping Address</label>
                <textarea rows="3" required></textarea>
              </div>
              <div class="d-flex gap-1">
                <div class="form-group flex-1">
                  <label>City</label>
                  <input type="text" required>
                </div>
                <div class="form-group flex-1">
                  <label>Zip Code</label>
                  <input type="text" required>
                </div>
              </div>
              <button type="submit" class="btn w-100">Continue to Payment</button>
            </form>
          </div>
        </div>
        <div class="cart-summary-container">
          <div class="cart-summary">
             <h3 class="mb-1-5">Order Summary</h3>
             <div id="checkout-summary">
                <div class="summary-row d-flex justify-between mb-1"><span>Items</span><span>1</span></div>
                <div class="summary-row d-flex justify-between mb-1"><span>Shipping</span><span>Free</span></div>
                <div class="summary-row summary-total d-flex justify-between border-top pt-1 fw-bold fs-1-2"><span>Total</span><span>$199.99</span></div>
             </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
