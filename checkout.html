<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Alvicx Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">Alvicx Store</a>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">Checkout</h1>
      <div class="cart-layout">
        <div class="cart-items-container">
          <div class="form-container" style="max-width: 100%; margin: 0;">
            <h3 style="margin-bottom: 1.5rem;">Shipping Information</h3>
            <form id="checkout-form" action="payment.html">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" required>
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" required>
              </div>
              <div class="form-group">
                <label>Shipping Address</label>
                <textarea rows="3" required></textarea>
              </div>
              <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex:1;">
                  <label>City</label>
                  <input type="text" required>
                </div>
                <div class="form-group" style="flex:1;">
                  <label>Zip Code</label>
                  <input type="text" required>
                </div>
              </div>
              <button type="submit" class="btn" style="width: 100%;">Continue to Payment</button>
            </form>
          </div>
        </div>
        <div class="cart-summary-container">
          <div class="cart-summary">
             <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
             <div id="checkout-summary">
                <div class="summary-row" style="display:flex; justify-content:space-between; margin-bottom:1rem;"><span>Items</span><span>1</span></div>
                <div class="summary-row" style="display:flex; justify-content:space-between; margin-bottom:1rem;"><span>Shipping</span><span>Free</span></div>
                <div class="summary-row summary-total" style="display:flex; justify-content:space-between; border-top:1px solid #e5e5e5; padding-top:1rem; font-weight:bold; font-size:1.2rem;"><span>Total</span><span>$199.99</span></div>
             </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
