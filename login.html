<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Alvicx Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">Alvicx Store</a>
  </header>

  <main>
    <div class="container" style="display: flex; justify-content: center; padding-top: 4rem;">
      <div class="form-container" style="width: 100%;">
        <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
        <form action="account.html">
          <div class="form-group">
            <label>Email</label>
            <input type="email" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" required>
          </div>
          <button type="submit" class="btn" style="width: 100%;">Sign In</button>
          <div style="text-align: center; margin-top: 1rem;">
            <a href="#" style="font-size: 0.9rem; color: var(--text-light);">Don't have an account? Register</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
