<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Alvicx Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">Alvicx Store</a>
  </header>

  <main>
    <div class="container d-flex justify-center pt-4">
      <div class="form-container w-100">
        <h2 class="text-center mb-2">Welcome Back</h2>
        <form action="account.html">
          <div class="form-group">
            <label>Email</label>
            <input type="email" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" required>
          </div>
          <button type="submit" class="btn w-100">Sign In</button>
          <div class="text-center mt-1">
            <a href="#" class="fs-0-9 text-light">Don't have an account? Register</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
